<h2>Popover API</h2>

<p>The <code>popover</code> attribute + <code>popovertarget</code> = dropdown without JS.</p>

<ul class="fragment">

	<li>Top layer — no z-index wars</li>
	<li>Accessible by default</li>
	<li>Works with <code>&lt;button&gt;</code> — semantic and keyboard-friendly</li>
</ul>
