<style>

    position: relative;

  .trig-demo .center {
    position: absolute;
    top: 50%;

  .trig-demo .dot {

    width: 2.5rem;
    height: 2.5rem;
    margin: -1.25rem;

    background: oklch(from var(--color-accent) l c calc(h + var(--i) * 30));

    font-weight: bold;
    color: var(--color-background);
    translate:
      calc(cos(var(--angle)) * 9rem)
      calc(sin(var(--angle)) * -9rem);
  }
</style>
