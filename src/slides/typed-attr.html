<h4 class="accent">Typed attr()</h4>
<style>
  .attr-demo {
    margin: 1rem auto;
    max-width: 35rem;
  }
  .attr-grid {
    display: grid;
    grid-template-columns: repeat(attr(data-columns type(<number>), 3), 1fr);
    gap: 0.5rem;
    margin: 1rem 0;
  }
  .attr-grid > div {
    padding: 1rem;
    border-radius: var(--border-radius-sm);
    text-align: center;
    font-weight: bold;
    background: attr(data-bg type(<color>), var(--color-primary));
    color: var(--color-background);
  }
</style>

<code-highlight language="css">
  .grid {
    grid-template-columns:
      repeat(attr(data-columns type(&lt;number&gt;), 3), 1fr);
  }
  .grid > div {
    background: attr(data-bg type(&lt;color&gt;), black);
  }
</code-highlight>

</div>
